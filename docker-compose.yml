services:
  postgres:
    image: postgres:16-alpine
    container_name: gymstack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymstack
      POSTGRES_PASSWORD: gymstack
      POSTGRES_DB: gymstack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gymstack-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
